name: Upstream check

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run sync (write new snapshot)
        run: pnpm sync:write | tee sync.log

      - name: Detect changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if upstream changed
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: upstream-sync
          title: "chore: sync upstream BlueConic API snapshot"
          commit-message: "chore: sync upstream BlueConic API snapshot"
          body: |
            Upstream API surface of `@blueconic/blueconic-react-native` changed. The snapshot in this PR captures the new surface.

            **Follow-up required before merging:**
            1. Update `index.d.ts` to reflect the diff below.
            2. Amend / add a commit with a Conventional Commit prefix:
               - `feat:` for new methods or capabilities (triggers a minor release)
               - `fix:` for type corrections (triggers a patch release)
               - `feat!:` or `BREAKING CHANGE:` for breaking changes (major release)
            3. Ensure `pnpm test` still passes.

            ---

            Snapshot diff attached as run log.
          labels: upstream-sync
